<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Smart Poultry Dashboard</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-slate-100 min-h-screen text-slate-800">

    <!-- ================= HEADER ================= -->

    <header class="glass-header sticky top-0 z-10 border-b-2 border-gradient-vibrant">

        <div class="container mx-auto px-6 py-4 flex justify-between items-center">

            <div class="flex items-center gap-3">

                <div class="logo-bounce text-4xl">
                    🐔
                </div>

                <h1 class="text-2xl font-bold">

                    <span class="text-indigo-600">
                        Smart
                    </span>

                    Poultry
                </h1>
            </div>

            <div
                id="connection-status"
                class="status-badge flex items-center gap-2 text-sm font-semibold text-green-700 bg-green-50 px-5 py-2 rounded-full"
            >

                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>

                <span id="status-text">
                    Connecting...
                </span>
            </div>
        </div>
    </header>

    <!-- ================= CONTENT ================= -->

    <main class="container mx-auto px-6 py-10">

        <!-- ================= CARD ================= -->

        <div class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-10">

            <!-- SUHU -->

            <div class="stat-card bg-gradient-to-r from-orange-500 to-amber-400 p-7 rounded-3xl shadow-xl text-white">

                <p class="text-sm font-bold uppercase mb-3">
                    Suhu Kandang
                </p>

                <div class="flex justify-between items-center">

                    <span
                        id="temp-val"
                        class="text-6xl font-extrabold"
                    >
                        0°C
                    </span>

                    <div class="text-5xl">
                        🌡️
                    </div>
                </div>
            </div>

            <!-- HUMIDITY -->

            <div class="stat-card bg-gradient-to-r from-blue-600 to-cyan-500 p-7 rounded-3xl shadow-xl text-white">

                <p class="text-sm font-bold uppercase mb-3">
                    Kelembaban
                </p>

                <div class="flex justify-between items-center">

                    <span
                        id="hum-val"
                        class="text-6xl font-extrabold"
                    >
                        0%
                    </span>

                    <div class="text-5xl">
                        💧
                    </div>
                </div>
            </div>

            <!-- FAN -->

            <div
                id="fan-card"
                class="stat-card bg-white p-7 rounded-3xl shadow-xl"
            >

                <p class="text-sm font-bold uppercase mb-3 text-slate-500">
                    Sistem Pendingin
                </p>

                <div class="flex justify-between items-center">

                    <div>

                        <span
                            id="fan-status"
                            class="text-5xl font-extrabold block"
                        >
                            OFF
                        </span>

                        <span
                            id="fan-subtext"
                            class="text-sm text-slate-400"
                        >
                            Relay Fan: OFF
                        </span>
                    </div>

                    <div
                        id="fan-icon"
                        class="text-6xl"
                    >
                        ⚙️
                    </div>
                </div>
            </div>

            <!-- LAMP -->

            <div
                id="lamp-card"
                class="stat-card bg-white p-7 rounded-3xl shadow-xl"
            >

                <p class="text-sm font-bold uppercase mb-3 text-slate-500">
                    Sistem Lampu
                </p>

                <div class="flex justify-between items-center">

                    <div>

                        <span
                            id="lamp-status"
                            class="text-5xl font-extrabold block"
                        >
                            OFF
                        </span>

                        <span
                            id="lamp-subtext"
                            class="text-sm text-slate-400"
                        >
                            Relay Lampu: OFF
                        </span>
                    </div>

                    <div
                        id="lamp-icon"
                        class="text-6xl"
                    >
                        💡
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= CHART + LOG ================= -->

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

            <!-- CHART -->

            <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-xl">

                <div class="flex justify-between items-center mb-6">

                    <h3 class="font-bold text-2xl">
                        Monitoring Realtime
                    </h3>

                    <div class="bg-slate-100 px-4 py-2 rounded-full text-sm text-slate-500">
                        Update tiap 5 detik
                    </div>
                </div>

                <div class="relative h-[350px]">

                    <canvas id="sensorChart"></canvas>

                </div>
            </div>

            <!-- LOG -->

            <div class="bg-white p-8 rounded-3xl shadow-xl">

                <h3 class="font-bold text-2xl mb-6">
                    Aktivitas
                </h3>

                <div
                    id="log-list"
                    class="space-y-3 overflow-y-auto custom-scrollbar max-h-[350px]"
                >

                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>

</body>
</html>
